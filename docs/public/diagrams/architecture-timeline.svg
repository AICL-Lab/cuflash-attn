<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900" height="220">
  <defs>
    <style>
      .text { font-family: Inter, system-ui, sans-serif; font-size: 12px; fill: #f8fafc; }
      .label { font-family: JetBrains Mono, monospace; font-size: 11px; fill: #94a3b8; }
      .year { font-family: Inter, system-ui, sans-serif; font-size: 14px; fill: #76B900; font-weight: 700; }
      .box { stroke: #333; stroke-width: 1; fill: #111; }
    </style>
  </defs>
  <rect width="900" height="220" fill="#000000"/>
  <text x="450" y="28" class="text" text-anchor="middle" font-weight="700" font-size="15">GPU Architecture Support Timeline</text>

  <!-- Timeline bar -->
  <line x1="80" y1="80" x2="820" y2="80" stroke="#333" stroke-width="2"/>

  <!-- Nodes -->
  <g transform="translate(80, 80)">
    <circle r="6" fill="#76B900"/>
    <text x="0" y="-15" class="year" text-anchor="middle">2017</text>
    <rect x="-55" y="20" width="110" height="70" class="box" rx="2"/>
    <text x="0" y="38" class="text" text-anchor="middle" font-weight="700">Volta</text>
    <text x="0" y="55" class="label" text-anchor="middle">sm_70 · V100</text>
    <text x="0" y="70" class="label" text-anchor="middle">96 KB SRAM</text>
    <text x="0" y="83" class="label" text-anchor="middle">Tensor Core v1</text>
  </g>

  <g transform="translate(250, 80)">
    <circle r="6" fill="#76B900"/>
    <text x="0" y="-15" class="year" text-anchor="middle">2018</text>
    <rect x="-55" y="20" width="110" height="70" class="box" rx="2"/>
    <text x="0" y="38" class="text" text-anchor="middle" font-weight="700">Turing</text>
    <text x="0" y="55" class="label" text-anchor="middle">sm_75 · RTX 2080 Ti</text>
    <text x="0" y="70" class="label" text-anchor="middle">96 KB SRAM</text>
    <text x="0" y="83" class="label" text-anchor="middle">RT + Tensor Core</text>
  </g>

  <g transform="translate(420, 80)">
    <circle r="6" fill="#76B900"/>
    <text x="0" y="-15" class="year" text-anchor="middle">2020</text>
    <rect x="-55" y="20" width="110" height="70" class="box" rx="2"/>
    <text x="0" y="38" class="text" text-anchor="middle" font-weight="700">Ampere</text>
    <text x="0" y="55" class="label" text-anchor="middle">sm_80/86 · A100</text>
    <text x="0" y="70" class="label" text-anchor="middle">164 KB SRAM</text>
    <text x="0" y="83" class="label" text-anchor="middle">TF32 · Sparse TC</text>
  </g>

  <g transform="translate(590, 80)">
    <circle r="6" fill="#76B900"/>
    <text x="0" y="-15" class="year" text-anchor="middle">2022</text>
    <rect x="-55" y="20" width="110" height="70" class="box" rx="2"/>
    <text x="0" y="38" class="text" text-anchor="middle" font-weight="700">Ada</text>
    <text x="0" y="55" class="label" text-anchor="middle">sm_89 · RTX 4090</text>
    <text x="0" y="70" class="label" text-anchor="middle">128 KB SRAM</text>
    <text x="0" y="83" class="label" text-anchor="middle">DLSS 3 · Opt. Flow</text>
  </g>

  <g transform="translate(760, 80)">
    <circle r="6" fill="#76B900"/>
    <text x="0" y="-15" class="year" text-anchor="middle">2022</text>
    <rect x="-55" y="20" width="110" height="70" class="box" rx="2"/>
    <text x="0" y="38" class="text" text-anchor="middle" font-weight="700">Hopper</text>
    <text x="0" y="55" class="label" text-anchor="middle">sm_90 · H100</text>
    <text x="0" y="70" class="label" text-anchor="middle">228 KB SRAM</text>
    <text x="0" y="83" class="label" text-anchor="middle">FP8 · Transformer Engine</text>
  </g>

  <text x="450" y="200" class="label" text-anchor="middle" font-size="11">Default targets: sm_80, sm_86 (A100 + RTX 30/40 series)</text>
</svg>
