<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <style>
      .text { font-family: Inter, system-ui, sans-serif; font-size: 12px; fill: #f8fafc; }
      .label { font-family: JetBrains Mono, monospace; font-size: 11px; fill: #94a3b8; }
      .block { stroke: #76B900; stroke-width: 1.5; fill: #0f1a00; }
      .thread { stroke: #333; stroke-width: 1; fill: #111; }
      .arrow { stroke: #76B900; stroke-width: 1.5; fill: none; marker-end: url(#a); }
    </style>
    <marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#76B900"/>
    </marker>
  </defs>
  <rect width="800" height="300" fill="#000000"/>
  <text x="400" y="28" class="text" text-anchor="middle" font-weight="700" font-size="15">Kernel Execution: Grid of (batch × heads) Blocks</text>

  <!-- Grid of blocks -->
  <g transform="translate(40, 60)">
    <text x="0" y="-10" class="label" font-size="12">Grid (B × H blocks)</text>

    <rect x="0" y="0" width="50" height="50" class="block" rx="2"/>
    <text x="25" y="30" class="text" text-anchor="middle" font-size="11">(0,0)</text>

    <rect x="55" y="0" width="50" height="50" class="block" rx="2"/>
    <text x="80" y="30" class="text" text-anchor="middle" font-size="11">(1,0)</text>

    <rect x="110" y="0" width="50" height="50" class="block" rx="2"/>
    <text x="135" y="30" class="text" text-anchor="middle" font-size="11">(2,0)</text>

    <rect x="0" y="55" width="50" height="50" class="block" rx="2"/>
    <text x="25" y="85" class="text" text-anchor="middle" font-size="11">(0,1)</text>

    <rect x="55" y="55" width="50" height="50" class="block" rx="2"/>
    <text x="80" y="85" class="text" text-anchor="middle" font-size="11">(1,1)</text>

    <text x="180" y="55" class="label" font-size="12">... (batch × num_heads) total</text>
  </g>

  <!-- Arrow -->
  <line x1="280" y1="110" x2="340" y2="110" class="arrow"/>

  <!-- Single block detail -->
  <g transform="translate(360, 50)">
    <text x="60" y="-10" class="label" font-size="12">Each Block: 128 Threads</text>

    <!-- Block outline -->
    <rect x="0" y="0" width="260" height="140" fill="none" stroke="#444" stroke-width="1" rx="2"/>

    <!-- 4 warps -->
    <rect x="10" y="10" width="55" height="120" class="thread" rx="2"/>
    <text x="37" y="25" class="text" text-anchor="middle" font-size="10" font-weight="600">Warp 0</text>
    <text x="37" y="42" class="label" text-anchor="middle" font-size="9">T0-T31</text>
    <text x="37" y="80" class="label" text-anchor="middle" font-size="9">Load Qᵢ</text>

    <rect x="70" y="10" width="55" height="120" class="thread" rx="2"/>
    <text x="97" y="25" class="text" text-anchor="middle" font-size="10" font-weight="600">Warp 1</text>
    <text x="97" y="42" class="label" text-anchor="middle" font-size="9">T32-T63</text>
    <text x="97" y="80" class="label" text-anchor="middle" font-size="9">Load Kⱼ,Vⱼ</text>

    <rect x="130" y="10" width="55" height="120" class="thread" rx="2"/>
    <text x="157" y="25" class="text" text-anchor="middle" font-size="10" font-weight="600">Warp 2</text>
    <text x="157" y="42" class="label" text-anchor="middle" font-size="9">T64-T95</text>
    <text x="157" y="80" class="label" text-anchor="middle" font-size="9">Compute S,P</text>

    <rect x="190" y="10" width="55" height="120" class="thread" rx="2"/>
    <text x="217" y="25" class="text" text-anchor="middle" font-size="10" font-weight="600">Warp 3</text>
    <text x="217" y="42" class="label" text-anchor="middle" font-size="9">T96-T127</text>
    <text x="217" y="80" class="label" text-anchor="middle" font-size="9">Update Oᵢ</text>
  </g>

  <!-- Bottom annotation -->
  <rect x="40" y="230" width="720" height="50" fill="#0a0a0a" stroke="#333" rx="2"/>
  <text x="400" y="250" class="label" text-anchor="middle" font-size="11">
    Block loops over KV blocks j = 0 … Tc-1 sequentially, while Q block i is fixed per block.
  </text>
  <text x="400" y="268" class="label" text-anchor="middle" font-size="11">
    Parallelism: across (batch × heads) blocks · Sequential: KV sequence axis
  </text>
</svg>
