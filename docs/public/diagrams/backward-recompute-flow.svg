<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <style>
      .text { font-family: Inter, system-ui, sans-serif; font-size: 12px; fill: #f8fafc; }
      .label { font-family: JetBrains Mono, monospace; font-size: 11px; fill: #94a3b8; }
      .green { fill: #76B900; }
      .box { stroke: #333; stroke-width: 1; fill: #111; }
      .active { stroke: #76B900; stroke-width: 1.5; fill: #0f1a00; }
      .grad { stroke: #3b82f6; stroke-width: 1.5; fill: #001a33; }
      .arrow { stroke: #76B900; stroke-width: 1.5; fill: none; marker-end: url(#a); }
      .garrow { stroke: #3b82f6; stroke-width: 1.5; fill: none; marker-end: url(#b); }
    </style>
    <marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#76B900"/>
    </marker>
    <marker id="b" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
  </defs>
  <rect width="800" height="300" fill="#000000"/>
  <text x="400" y="28" class="text" text-anchor="middle" font-weight="700" font-size="15">Backward Pass: Recomputation Strategy</text>

  <!-- Inputs -->
  <g transform="translate(30, 60)">
    <rect x="0" y="0" width="55" height="40" class="box" rx="2"/>
    <text x="27" y="25" class="text" text-anchor="middle" font-size="11">Q</text>

    <rect x="65" y="0" width="55" height="40" class="box" rx="2"/>
    <text x="92" y="25" class="text" text-anchor="middle" font-size="11">K</text>

    <rect x="130" y="0" width="55" height="40" class="box" rx="2"/>
    <text x="157" y="25" class="text" text-anchor="middle" font-size="11">V</text>

    <rect x="195" y="0" width="55" height="40" class="box" rx="2"/>
    <text x="222" y="25" class="text" text-anchor="middle" font-size="11">O</text>

    <rect x="260" y="0" width="55" height="40" class="box" rx="2"/>
    <text x="287" y="25" class="text" text-anchor="middle" font-size="11">L</text>

    <rect x="325" y="0" width="55" height="40" class="grad" rx="2"/>
    <text x="352" y="25" class="text" text-anchor="middle" font-size="11">dO</text>
  </g>

  <text x="30" y="55" class="label" font-size="10">Forward outputs + upstream gradient</text>

  <!-- Recompute box -->
  <rect x="200" y="140" width="200" height="60" class="active" rx="2"/>
  <text x="300" y="165" class="green" text-anchor="middle" font-weight="700" font-size="13">Recompute Pᵢⱼ = exp(Sᵢⱼ - Lᵢ)</text>
  <text x="300" y="185" class="label" text-anchor="middle">On-the-fly in SRAM · No O(N²) storage</text>

  <!-- Arrows to recompute -->
  <line x1="85" y1="100" x2="260" y2="140" class="arrow"/>
  <line x1="157" y1="100" x2="280" y2="140" class="arrow"/>
  <line x1="222" y1="100" x2="300" y2="140" class="arrow"/>
  <line x1="287" y1="100" x2="320" y2="140" class="arrow"/>
  <line x1="352" y1="100" x2="340" y2="140" class="garrow"/>

  <!-- Output gradients -->
  <g transform="translate(480, 140)">
    <rect x="0" y="0" width="80" height="60" class="grad" rx="2"/>
    <text x="40" y="28" class="text" text-anchor="middle" font-size="13" fill="#3b82f6">dQ</text>
    <text x="40" y="45" class="label" text-anchor="middle" font-size="10">scale × dS × K</text>
  </g>

  <g transform="translate(590, 140)">
    <rect x="0" y="0" width="80" height="60" class="grad" rx="2"/>
    <text x="40" y="28" class="text" text-anchor="middle" font-size="13" fill="#3b82f6">dK</text>
    <text x="40" y="45" class="label" text-anchor="middle" font-size="10">scale × dSᵀ × Q</text>
  </g>

  <g transform="translate(700, 140)">
    <rect x="0" y="0" width="80" height="60" class="grad" rx="2"/>
    <text x="40" y="28" class="text" text-anchor="middle" font-size="13" fill="#3b82f6">dV</text>
    <text x="40" y="45" class="label" text-anchor="middle" font-size="10">Pᵀ × dO</text>
  </g>

  <!-- Arrows from recompute -->
  <line x1="400" y1="170" x2="480" y2="170" class="garrow"/>
  <line x1="400" y1="170" x2="590" y2="170" class="garrow"/>
  <line x1="400" y1="170" x2="700" y2="170" class="garrow"/>

  <!-- Bottom annotation -->
  <rect x="150" y="240" width="500" height="40" fill="#0a0a0a" stroke="#333" rx="2"/>
  <text x="400" y="265" class="label" text-anchor="middle" font-size="11">
    Memory: O(N) instead of O(N²) · Trade-off: ~33% extra FLOPs for significantly reduced HBM IO
  </text>
</svg>
